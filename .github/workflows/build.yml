name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact@v4
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn package
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: HardcoreRebirth
          path: target/HardcoreRebirth-1.0.jar
